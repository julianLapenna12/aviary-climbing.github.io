baseURL: https://ubc-aviary.com
languageCode: en-us
title: UBC Aviary

security:
  enableInlineShortcodes: true

module:
  imports:
    - path: github.com/imfing/hextra

caches:
  images:
    dir: :cacheDir/images

markup:
  goldmark:
    renderer:
      unsafe: true

params:
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: img/logo.jpg
      dark: img/logo.jpg
      link: /
      width: 20
      height: 20
  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: content

menu:
  main:
    # - name: Documentation
    #   pageRef: /docs
    #   weight: 1
    # - name: Blog
    #   pageRef: /blog
    #   weight: 2
    # - name: About
    #   pageRef: /about
    #   weight: 3
    - name: Search
      weight: 4
      params:
        type: search
    - name: GitHub
      weight: 5
      url: "https://www.instagram.com/ubcaviary/"
      params:
        icon: instagram
