{{- $img := .Page.Resources.GetMatch (.Get "src") -}}
{{- with $img -}}
<div style="position: relative; width: 100%; height: 60vh; overflow: hidden;">
    <img src="{{ .RelPermalink }}" alt="Aviary Banner"
        style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5);">
    <div style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;">
        <img src="img/final.aviary-text.png" alt=" The Aviary" style="max-width: 80%; max-height: 80%;">
    </div>
</div>
{{- else -}}
<p style="color: red;">Error: Could not find image "{{ .Get "src" }}" in this folder.</p>
{{- end -}}
